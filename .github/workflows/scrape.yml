name: Daily AMC Scraper and Deploy

on:
  schedule:
    # Runs at 08:00 UTC every day (4:00 AM Eastern Daylight Time)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows you to manually click "Run workflow" from the Actions tab

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-update:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
        
      - name: Run AMC Scraper
        run: node scraper.js
        
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the JSON data files
          git add data.json frontend/public/data.json
          
          # Only commit if there are actual changes to the data
          git diff --staged --quiet || (git commit -m "Automated update: AMC showtimes data" && git push)

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
